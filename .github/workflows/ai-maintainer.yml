name: AI Repository Maintainer (Claude)

on:
  # Automatically trigger when the Gatsby build workflow fails
  workflow_run:
    workflows: ["Deploy Gatsby site to Pages"]
    types: [completed]

  # Also allow manual trigger and weekly scheduled run
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual maintenance run"

  schedule:
    - cron: "0 3 * * 1"   # Every Monday at 03:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-maintainer:
    # For workflow_run: only run when the build actually failed.
    # For manual / scheduled: always run.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'failure'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git operations work correctly
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install AI Maintainer dependencies
        run: |
          # Install only the packages the maintainer script needs.
          # These are separate from the site's own dependencies.
          npm install --no-save @anthropic-ai/sdk

      - name: Run AI Maintainer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FAILED_WORKFLOW: ${{ github.event.workflow_run.name || github.event_name }}
        run: node .github/scripts/ai-maintainer.js

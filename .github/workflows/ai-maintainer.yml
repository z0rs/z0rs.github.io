name: AI Repository Maintainer (Claude)

on:
  workflow_dispatch:
  schedule:
    # Runs every Monday at 03:00 UTC
    - cron: "0 3 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-maintainer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Full history allows git apply and diff to work correctly
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install AI Maintainer Dependencies
        # Install into an isolated directory to avoid polluting the project's
        # own node_modules and package.json
        working-directory: .github/scripts
        run: |
          npm init -y
          npm install @anthropic-ai/sdk

      - name: Run Claude Maintainer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/ai-maintainer.js

      - name: Remove patch artifact from working tree
        # Keep ai.patch out of the eventual PR commit
        if: always()
        run: rm -f ai.patch

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-maintenance
          delete-branch: true
          title: "chore: AI Maintainer automated fixes"
          body: |
            ## Automated Maintenance — Claude Sonnet

            This pull request was generated automatically by the AI Repository Maintainer workflow.

            ### What happened
            1. Claude audited the repository (filtered snapshot — no secrets or binaries).
            2. Claude produced a unified diff patch targeting the identified issues.
            3. The patch was validated with `git apply --check` before being applied.

            ### Review checklist
            - [ ] Review every changed file before merging
            - [ ] Confirm the Gatsby build still passes in CI
            - [ ] Verify no secrets or unrelated files were modified

            > ⚠️ **Always review AI-generated patches before merging.**
          base: master
          commit-message: "chore: AI Maintainer automated fixes"
          labels: "ai-maintenance,automated"

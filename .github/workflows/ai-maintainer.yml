name: AI Repository Maintainer (Claude)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-maintainer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          npm install @anthropic-ai/sdk simple-git

      - name: Run Claude Maintainer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/ai-maintainer.js

      - name: Commit Changes
        run: |
          git config --global user.name "ai-maintainer"
          git config --global user.email "ai@bot.com"

          if [ -n "$(git status --porcelain)" ]; then
            git checkout -b ai-maintenance
            git add .
            git commit -m "AI Maintainer: automatic fixes"
            git push origin ai-maintenance
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai-maintenance
          title: "AI Maintainer Fixes"
          body: |
            Automated fixes generated by Claude Sonnet 4.6
          base: master
